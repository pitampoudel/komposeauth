name: Publish Docker Image

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests with parallel execution
        run: ./gradlew clean :server:check --parallel --build-cache --no-daemon

  build-and-push:
    name: Build and Push Image (Buildpacks)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/komposeauth

      - name: Build image with Buildpacks and push tags
        shell: bash
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          PRIMARY_TAG="$(printf '%s\n' "$TAGS" | head -n1)"

          if [ -z "$PRIMARY_TAG" ]; then
            echo "No image tags were generated."
            exit 1
          fi

          ./gradlew :server:bootBuildImage --imageName="$PRIMARY_TAG" --no-daemon

          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue

            if [ "$tag" != "$PRIMARY_TAG" ]; then
              docker tag "$PRIMARY_TAG" "$tag"
            fi

            docker push "$tag"
          done
