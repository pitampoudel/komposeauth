spring:
  application:
    name: "komposeauth"
  mongodb:
    uri: ${MONGODB_URI}
  data:
    mongodb:
      auto-index-creation: true
  jmx:
    enabled: false
  web:
    error:
      include-exception: false
      include-message: always
      include-stacktrace: never
      include-binding-errors: always
logging:
  level:
    root: ERROR

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

app:
  base64-encryption-key: ${BASE64_ENCRYPTION_KEY}

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
