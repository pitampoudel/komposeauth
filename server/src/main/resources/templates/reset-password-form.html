<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName.isEmpty()} ? 'Reset Password' : 'Reset Password — ' + ${appName}">Reset Password</title>
    <style th:inline="css">
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: /*[(${brandColor})]*/ initial;
        }

        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            background: #080f1e;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .wrap {
            width: 100%;
            max-width: 368px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .brand-mark {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--brand);
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .heading {
            font-size: 22px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
        }

        .subheading {
            font-size: 14px;
            color: #475569;
            margin-bottom: 48px;
        }

        .field {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .hint {
            font-size: 12px;
            color: #334155;
            margin-top: 8px;
        }

        input[type=password] {
            width: 100%;
            font-size: 15px;
            font-family: inherit;
            color: #f1f5f9;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1e2d45;
            padding: 0 0 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: #1e3050; }
        input:focus { border-bottom-color: var(--brand); }

        .actions {
            margin-top: 48px;
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            font-size: 13px;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 32px;
        }

        .status-success {
            color: #6ee7b7;
            background: rgba(110, 231, 183, 0.06);
        }

        .status-error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.06);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
<div class="wrap">

    <div class="brand">
        <img th:if="${!logoUrl.isEmpty()}" th:src="${logoUrl}" class="brand-logo" alt=""/>
        <div th:if="${logoUrl.isEmpty()}" class="brand-mark"></div>
        <span th:if="${!appName.isEmpty()}" class="brand-name" th:text="${appName}"></span>
    </div>

    <h1 class="heading">Set new password</h1>
    <p class="subheading">Choose a strong password you don't use elsewhere.</p>

    <div id="status" class="hidden"></div>

    <form id="reset-form">
        <input type="hidden" id="token" th:value="${token}"/>

        <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" name="newPassword"
                   autocomplete="new-password" placeholder="••••••••" minlength="8" required/>
            <p class="hint">At least 8 characters</p>
        </div>

        <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   autocomplete="new-password" placeholder="••••••••" required/>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="submit-btn" type="submit">Reset password</button>
        </div>
    </form>

</div>
<script>
    (function () {
        const form = document.getElementById('reset-form');
        const btn = document.getElementById('submit-btn');
        const statusEl = document.getElementById('status');

        function showStatus(type, text) {
            statusEl.textContent = text;
            statusEl.className = 'status status-' + type;
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 8) {
                showStatus('error', 'Password must be at least 8 characters.');
                return;
            }
            if (newPassword !== confirmPassword) {
                showStatus('error', 'Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Please wait…';
            statusEl.className = 'hidden';

            try {
                const body = new URLSearchParams({token, newPassword, confirmPassword});
                const res = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body
                });

                if (res.redirected) { window.location.assign(res.url); return; }

                const ct = res.headers.get('Content-Type') || '';
                const data = ct.includes('application/json')
                    ? await res.json().catch(() => ({}))
                    : {message: await res.text().catch(() => '')};

                if (res.ok) {
                    showStatus('success', data.message || 'Password updated. You can now sign in.');
                    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
                } else {
                    showStatus('error', data.message || data.error || 'Unable to reset password.');
                }
            } catch (_) {
                showStatus('error', 'Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset password';
            }
        });
    })();
</script>
</body>
</html>
