<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName.isEmpty()} ? 'Sign In' : 'Sign In — ' + ${appName}">Sign In</title>
    <style th:inline="css">
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: /*[(${brandColor})]*/ initial;
        }

        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            background: #080f1e;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .wrap {
            width: 100%;
            max-width: 368px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .brand-mark {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--brand);
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .heading {
            font-size: 22px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
        }

        .subheading {
            font-size: 14px;
            color: #475569;
            margin-bottom: 48px;
        }

        .field {
            margin-bottom: 32px;
        }

        .field-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .forgot-link {
            font-size: 12px;
            color: #475569;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s;
        }

        .forgot-link:hover { color: #94a3b8; }

        input[type=text],
        input[type=password],
        input[type=email] {
            width: 100%;
            font-size: 15px;
            font-family: inherit;
            color: #f1f5f9;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1e2d45;
            padding: 0 0 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: #1e3050; }

        input:focus { border-bottom-color: var(--brand); }

        .actions {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: opacity 0.15s, background 0.15s;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #1e2d45;
            font-size: 11px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #111c2e;
        }

        .btn-google {
            background: #0d1627;
            color: #94a3b8;
        }

        .btn-google:hover { background: #111e35; }

        .google-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .error {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 32px;
            padding: 12px 16px;
            background: rgba(248, 113, 113, 0.06);
            border-radius: 6px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #475569;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 40px;
            transition: color 0.15s;
        }

        .back-link:hover { color: #94a3b8; }

        .status {
            font-size: 13px;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 32px;
        }

        .status-success {
            color: #6ee7b7;
            background: rgba(110, 231, 183, 0.06);
        }

        .status-error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.06);
        }

        .hidden { display: none; }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>
<div class="wrap">

    <div class="brand">
        <img th:if="${!logoUrl.isEmpty()}" th:src="${logoUrl}" class="brand-logo" alt=""/>
        <div th:if="${logoUrl.isEmpty()}" class="brand-mark"></div>
        <span th:if="${!appName.isEmpty()}" class="brand-name" th:text="${appName}"></span>
    </div>

    <!-- Login view -->
    <div id="view-login" class="view active">
        <h1 class="heading">Welcome back</h1>
        <p class="subheading"
           th:text="${appName.isEmpty()} ? 'Sign in to your account to continue' : 'Sign in to ' + ${appName} + ' to continue'">
            Sign in to your account to continue
        </p>

        <p th:if="${error}" class="error" th:text="${error}"></p>

        <form th:action="@{/session-login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>

            <div class="field">
                <label for="username">Email or phone</label>
                <input id="username" type="text" name="username" autocomplete="username" placeholder="you@example.com" required autofocus/>
            </div>

            <div class="field">
                <div class="field-row">
                    <label for="password">Password</label>
                    <button type="button" class="forgot-link" onclick="showView('forgot')">Forgot password?</button>
                </div>
                <input id="password" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Continue</button>

                <div th:if="${googleEnabled}" class="divider">or</div>

                <a th:if="${googleEnabled}" class="btn btn-google" href="/oauth2/authorization/google">
                    <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Continue with Google
                </a>
            </div>
        </form>
    </div>

    <!-- Forgot password view -->
    <div id="view-forgot" class="view">
        <button type="button" class="back-link" onclick="showView('login')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to sign in
        </button>

        <h1 class="heading">Reset password</h1>
        <p class="subheading">Enter your email and we'll send you a reset link.</p>

        <div id="forgot-status" class="hidden"></div>

        <form id="forgot-form">
            <div class="field">
                <label for="reset-email">Email address</label>
                <input id="reset-email" type="email" autocomplete="email" placeholder="you@example.com" required/>
            </div>

            <div class="actions">
                <button id="forgot-btn" class="btn btn-primary" type="submit">Send reset link</button>
            </div>
        </form>
    </div>

</div>
<script>
    function showView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + name).classList.add('active');
        if (name === 'forgot') {
            document.getElementById('reset-email').value = '';
            document.getElementById('forgot-status').className = 'hidden';
            document.getElementById('forgot-form').style.display = '';
        }
    }

    document.getElementById('forgot-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('forgot-btn');
        const statusEl = document.getElementById('forgot-status');

        btn.disabled = true;
        btn.textContent = 'Sending…';
        statusEl.className = 'hidden';

        try {
            const res = await fetch('/reset-password?email=' + encodeURIComponent(email), {
                method: 'PUT',
                headers: { 'Accept': 'application/json' }
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
                statusEl.textContent = data.message || 'Reset link sent. Check your inbox.';
                statusEl.className = 'status status-success';
                document.getElementById('forgot-form').style.display = 'none';
            } else {
                statusEl.textContent = data.message || 'Something went wrong. Please try again.';
                statusEl.className = 'status status-error';
            }
        } catch (_) {
            statusEl.textContent = 'Network error. Please try again.';
            statusEl.className = 'status status-error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send reset link';
        }
    });
</script>
</body>
</html>
