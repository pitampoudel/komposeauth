<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName.isEmpty()} ? 'OAuth2 Clients' : ${appName} + ' — OAuth2 Clients'">OAuth2 Clients</title>
    <style th:inline="css">
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: /*[(${brandColor})]*/ initial;
        }

        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            background: #080f1e;
            color: #e2e8f0;
            min-height: 100vh;
        }

        nav {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-bottom: 1px solid #111c2e;
            background: #080f1e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            object-fit: cover;
        }

        .brand-mark {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--brand);
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .nav-title {
            margin-left: 24px;
            padding-left: 24px;
            border-left: 1px solid #1e2d45;
            font-size: 13px;
            color: #475569;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 32px 80px;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 40px;
        }

        .page-heading {
            font-size: 22px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 14px;
            color: #475569;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.15s, background 0.15s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary { background: var(--brand); color: #fff; }
        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary { background: #0d1627; color: #94a3b8; }
        .btn-secondary:hover { background: #111e35; }

        .btn-danger { background: rgba(239,68,68,0.12); color: #f87171; }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }

        .status-msg {
            font-size: 13px;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 24px;
        }

        .status-success { color: #6ee7b7; background: rgba(110,231,183,0.06); }
        .status-error { color: #f87171; background: rgba(248,113,113,0.06); }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
            font-size: 13px;
        }

        thead th {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #334155;
            padding: 0 12px 16px;
            text-align: left;
        }

        tbody tr { border-top: 1px solid #111c2e; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        td {
            padding: 16px 12px;
            vertical-align: middle;
            color: #94a3b8;
        }

        td.name { color: #e2e8f0; font-weight: 500; }

        .code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            color: #64748b;
            word-break: break-all;
        }

        .row-actions { display: flex; gap: 8px; }

        .empty {
            text-align: center;
            padding: 64px 0;
            color: #334155;
            font-size: 14px;
        }

        /* Dialog */
        dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            background: #0d1627;
            border: 1px solid #1e2d45;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            color: #e2e8f0;
            width: min(560px, calc(100% - 32px));
            padding: 0;
            outline: none;
        }

        dialog::backdrop { background: rgba(0,0,0,0.7); }

        .dialog-inner { padding: 28px 28px 24px; }

        .dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .dialog-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #475569;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }

        .close-btn:hover { background: #111e35; color: #94a3b8; }

        .field { margin-bottom: 28px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #475569;
            margin-bottom: 10px;
        }

        input[type=text],
        input[type=url],
        textarea {
            width: 100%;
            font-size: 14px;
            font-family: inherit;
            color: #f1f5f9;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1e2d45;
            padding: 0 0 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea {
            background: #080f1e;
            border: none;
            border-radius: 6px;
            padding: 10px 12px;
            resize: vertical;
            min-height: 80px;
        }

        textarea:focus { background: #0a1220; }
        input:focus { border-bottom-color: var(--brand); }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 24px;
            border-top: 1px solid #111c2e;
        }

        @media (max-width: 640px) {
            nav { padding: 0 16px; }
            .container { padding: 32px 16px 64px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img th:if="${!logoUrl.isEmpty()}" th:src="${logoUrl}" class="brand-logo" alt=""/>
        <div th:if="${logoUrl.isEmpty()}" class="brand-mark"></div>
        <span th:if="${!appName.isEmpty()}" class="brand-name" th:text="${appName}"></span>
    </div>
    <span class="nav-title">OAuth2 Clients</span>
</nav>

<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-heading">OAuth2 Clients</h1>
            <p class="page-sub">Registered applications that can request tokens from this server.</p>
        </div>
        <button class="btn btn-primary" type="button" id="newClientBtn">+ New client</button>
    </div>

    <div id="status" class="hidden"></div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Client ID</th>
                <th>Redirect URIs</th>
                <th>Scopes</th>
                <th></th>
            </tr>
            </thead>
            <tbody id="clientsBody">
            <tr id="empty-row">
                <td colspan="5" class="empty">No clients registered yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<dialog id="clientDialog">
    <div class="dialog-inner">
        <div class="dialog-header">
            <span class="dialog-title" id="formTitle">Create client</span>
            <button class="close-btn" id="closeDialogBtn" type="button" aria-label="Close">&#x2715;</button>
        </div>

        <form id="clientForm">
            <div class="field">
                <label for="clientName">Client name</label>
                <input id="clientName" type="text" required placeholder="My Application"/>
            </div>
            <div class="field">
                <label for="clientSecret">Client secret <span style="color:#334155;font-size:11px;text-transform:none;letter-spacing:0">(leave blank to auto-generate)</span></label>
                <input id="clientSecret" type="text" placeholder="Leave blank to generate"/>
            </div>
            <div class="field">
                <label for="redirectUris">Redirect URIs <span style="color:#334155;font-size:11px;text-transform:none;letter-spacing:0">(one per line)</span></label>
                <textarea id="redirectUris" placeholder="https://yourapp.com/callback"></textarea>
            </div>
            <div class="field">
                <label for="scopes">Scopes <span style="color:#334155;font-size:11px;text-transform:none;letter-spacing:0">(one per line)</span></label>
                <textarea id="scopes"></textarea>
            </div>
            <div class="field">
                <label for="clientUri">Client URI</label>
                <input id="clientUri" type="url" placeholder="https://yourapp.com"/>
            </div>
            <div class="field">
                <label for="logoUri">Logo URI</label>
                <input id="logoUri" type="url" placeholder="https://yourapp.com/logo.png"/>
            </div>

            <div id="dialogStatus" class="hidden"></div>

            <div class="dialog-actions">
                <button class="btn btn-secondary" type="button" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" type="submit" id="submitBtn">Create client</button>
            </div>
        </form>
    </div>
</dialog>

<script>
    const API_BASE = "/oauth2/clients";
    const defaultScopes = "openid\nprofile\nemail\noffline_access\nuser.read.any";

    const clientsBody = document.getElementById("clientsBody");
    const emptyRow = document.getElementById("empty-row");
    const newClientBtn = document.getElementById("newClientBtn");
    const clientDialog = document.getElementById("clientDialog");
    const clientForm = document.getElementById("clientForm");
    const statusEl = document.getElementById("status");
    const dialogStatusEl = document.getElementById("dialogStatus");
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const closeDialogBtn = document.getElementById("closeDialogBtn");
    const formState = {editingClientId: null, mode: "create"};

    function parseSet(value) {
        return [...new Set(value.split(/[\n,]/).map(s => s.trim()).filter(Boolean))];
    }

    function showStatus(el, type, text) {
        el.textContent = text;
        el.className = "status-msg status-" + type;
    }

    function resetForm() {
        document.getElementById("clientName").value = "";
        document.getElementById("clientSecret").value = "";
        document.getElementById("redirectUris").value = "";
        document.getElementById("scopes").value = defaultScopes;
        document.getElementById("clientUri").value = "";
        document.getElementById("logoUri").value = "";
        dialogStatusEl.className = "hidden";
    }

    function openCreate() {
        formState.editingClientId = null;
        formState.mode = "create";
        formTitle.textContent = "Create client";
        submitBtn.textContent = "Create client";
        resetForm();
        clientDialog.showModal();
    }

    function openEdit(client) {
        formState.editingClientId = client.clientId;
        formState.mode = "edit";
        formTitle.textContent = "Edit client";
        submitBtn.textContent = "Save changes";
        document.getElementById("clientName").value = client.clientName || "";
        document.getElementById("clientSecret").value = client.clientSecret || "";
        document.getElementById("redirectUris").value = (client.redirectUris || []).join("\n");
        document.getElementById("scopes").value = (client.scopes || []).join("\n");
        document.getElementById("clientUri").value = client.clientUri || "";
        document.getElementById("logoUri").value = client.logoUri || "";
        dialogStatusEl.className = "hidden";
        clientDialog.showModal();
    }

    function closeDialog() {
        clientDialog.close();
        formState.editingClientId = null;
        formState.mode = "create";
        resetForm();
    }

    function renderClients(clients) {
        const rows = clientsBody.querySelectorAll("tr:not(#empty-row)");
        rows.forEach(r => r.remove());

        if (!clients.length) {
            emptyRow.style.display = "";
            return;
        }
        emptyRow.style.display = "none";

        clients.forEach(function (client) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="name">${esc(client.clientName || "")}</td>
                <td class="code">${esc(client.clientId || "")}</td>
                <td>${esc((client.redirectUris || []).join(", "))}</td>
                <td>${esc((client.scopes || []).join(", "))}</td>
                <td>
                    <div class="row-actions">
                        <button class="btn btn-secondary btn-edit" type="button">Edit</button>
                        <button class="btn btn-danger btn-delete" type="button">Delete</button>
                    </div>
                </td>`;
            tr.querySelector(".btn-edit").addEventListener("click", () => openEdit(client));
            tr.querySelector(".btn-delete").addEventListener("click", async () => {
                if (!confirm("Delete " + client.clientName + "?")) return;
                try {
                    const res = await fetch(API_BASE + "/" + encodeURIComponent(client.clientId), {method: "DELETE", credentials: "same-origin"});
                    if (!res.ok) throw new Error();
                    showStatus(statusEl, "success", "Client deleted.");
                    await loadClients();
                } catch (_) {
                    showStatus(statusEl, "error", "Failed to delete client.");
                }
            });
            clientsBody.appendChild(tr);
        });
    }

    function esc(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    async function loadClients() {
        try {
            const res = await fetch(API_BASE, {credentials: "same-origin"});
            if (!res.ok) throw new Error();
            renderClients(await res.json());
        } catch (_) {
            showStatus(statusEl, "error", "Failed to load clients.");
        }
    }

    clientForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        dialogStatusEl.className = "hidden";
        const isEdit = formState.mode === "edit";
        const payload = {
            clientName: document.getElementById("clientName").value.trim(),
            clientSecret: document.getElementById("clientSecret").value.trim() || null,
            redirectUris: parseSet(document.getElementById("redirectUris").value),
            scopes: parseSet(document.getElementById("scopes").value),
            clientUri: document.getElementById("clientUri").value.trim() || null,
            logoUri: document.getElementById("logoUri").value.trim() || null
        };
        if (isEdit) payload.clientId = formState.editingClientId;

        try {
            const res = await fetch(API_BASE, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                credentials: "same-origin",
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error();
            showStatus(statusEl, "success", isEdit ? "Client updated." : "Client created.");
            closeDialog();
            await loadClients();
        } catch (_) {
            showStatus(dialogStatusEl, "error", "Failed to save client.");
        }
    });

    newClientBtn.addEventListener("click", openCreate);
    cancelBtn.addEventListener("click", closeDialog);
    closeDialogBtn.addEventListener("click", closeDialog);
    clientDialog.addEventListener("click", e => { if (e.target === clientDialog) closeDialog(); });

    loadClients();
</script>
</body>
</html>
