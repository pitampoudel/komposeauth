<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title th:text="${subject}">Notification</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

<!-- Hidden preheader -->
<div th:if="${preheader}" th:text="${preheader}"
     style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
</div>

<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f1f5f9;">
    <tr>
        <td align="center" style="padding:40px 16px;">

            <table width="100%" cellpadding="0" cellspacing="0" role="presentation"
                   style="max-width:580px;background-color:#ffffff;border-radius:8px;overflow:hidden;">

                <!-- Brand accent bar -->
                <tr>
                    <td th:style="|height:4px;background-color:${brandColor ?: '#4f46e5'};|"
                        style="height:4px;background-color:#4f46e5;font-size:0;line-height:0;">&nbsp;
                    </td>
                </tr>

                <!-- Header -->
                <tr>
                    <td align="center" style="padding:32px 48px 24px;">
                        <img th:if="${logoUrl != null and !logoUrl.isEmpty()}" th:src="${logoUrl}" alt=""
                             style="max-height:40px;max-width:160px;height:auto;display:block;margin:0 auto;"/>
                        <span th:if="${(logoUrl == null or logoUrl.isEmpty()) and appName != null and !appName.isEmpty()}"
                              th:text="${appName}"
                              style="font-size:18px;font-weight:700;color:#0f172a;font-family:Arial,Helvetica,sans-serif;">
                            Brand
                        </span>
                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td style="padding:0 48px;">
                        <div style="height:1px;background-color:#e2e8f0;font-size:0;line-height:0;">&nbsp;</div>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:36px 48px;color:#334155;font-family:Arial,Helvetica,sans-serif;">

                        <!-- Subject / heading -->
                        <h1 th:text="${subject}"
                            style="margin:0 0 24px;font-size:22px;font-weight:700;color:#0f172a;line-height:1.3;">
                            Notification
                        </h1>

                        <!-- Greeting -->
                        <p th:if="${recipientName}"
                           style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#334155;">
                            Hi <span th:text="${recipientName}">there</span>,
                        </p>

                        <!-- Message -->
                        <p th:if="${message}" th:text="${message}"
                           style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#475569;">
                        </p>

                        <!-- Code block -->
                        <table th:if="${code}" width="100%" cellpadding="0" cellspacing="0" role="presentation">
                            <tr>
                                <td align="center" style="padding:8px 0 24px;">
                                    <p th:if="${codeLabel}" th:text="${codeLabel}"
                                       style="margin:0 0 12px;font-size:13px;color:#64748b;text-align:center;">
                                    </p>
                                    <div style="display:inline-block;background-color:#f8fafc;border-radius:8px;padding:20px 40px;">
                                        <span th:text="${code}"
                                              style="font-size:32px;font-weight:700;letter-spacing:8px;color:#0f172a;font-family:'Courier New',Courier,monospace;">
                                            ——————
                                        </span>
                                    </div>
                                    <p th:if="${expiryText}" th:text="${expiryText}"
                                       style="margin:12px 0 0;font-size:13px;color:#94a3b8;text-align:center;">
                                    </p>
                                </td>
                            </tr>
                        </table>

                        <!-- CTA button -->
                        <table th:if="${actionUrl != null and actionText != null}" width="100%" cellpadding="0"
                               cellspacing="0" role="presentation">
                            <tr>
                                <td align="center" style="padding:8px 0 28px;">
                                    <a th:href="${actionUrl}" th:text="${actionText}"
                                       th:style="${'display:inline-block;padding:10px 22px;background-color:' + (brandColor != null ? brandColor : '#4f46e5') + ';color:#ffffff;text-decoration:none;font-weight:600;border-radius:6px;font-family:Arial,Helvetica,sans-serif;font-size:13px;'}"
                                       style="display:inline-block;padding:10px 22px;background-color:#4f46e5;color:#ffffff;text-decoration:none;font-weight:600;border-radius:6px;font-family:Arial,Helvetica,sans-serif;font-size:13px;">
                                        Continue
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <!-- Details table -->
                        <table th:if="${details != null and !#lists.isEmpty(details)}" width="100%" cellpadding="0"
                               cellspacing="0" role="presentation"
                               style="margin-top:8px;margin-bottom:24px;">
                            <tr th:each="d : ${details}">
                                <td style="padding:10px 0;font-size:13px;color:#94a3b8;width:40%;vertical-align:top;border-bottom:1px solid #f1f5f9;">
                                    <span th:text="${d.key}"></span>
                                </td>
                                <td style="padding:10px 0;font-size:13px;color:#334155;vertical-align:top;border-bottom:1px solid #f1f5f9;">
                                    <span th:text="${d.value}"></span>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td style="padding:0 48px;">
                        <div style="height:1px;background-color:#e2e8f0;font-size:0;line-height:0;">&nbsp;</div>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding:24px 48px 32px;font-family:Arial,Helvetica,sans-serif;">

                        <!-- Help text -->
                        <p th:if="${helpText}" th:text="${helpText}"
                           style="margin:0 0 12px;font-size:13px;color:#94a3b8;line-height:1.6;">
                        </p>

                        <!-- Support email -->
                        <p th:if="${supportEmail}" style="margin:0 0 20px;font-size:13px;color:#94a3b8;">
                            Need help?
                            <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}"
                               th:style="|color:${brandColor ?: '#4f46e5'};text-decoration:none;|"
                               style="color:#4f46e5;text-decoration:none;">
                            </a>
                        </p>

                        <!-- Social links -->
                        <p th:if="${!#strings.isEmpty(facebookUrl) or !#strings.isEmpty(instagramUrl) or !#strings.isEmpty(tiktokUrl) or !#strings.isEmpty(youtubeUrl) or !#strings.isEmpty(linkedinUrl)}"
                           style="margin:0 0 16px;font-size:12px;color:#cbd5e1;">
                            <a th:if="${!#strings.isEmpty(facebookUrl)}" th:href="${facebookUrl}"
                               style="color:#94a3b8;text-decoration:none;margin-right:12px;">Facebook</a>
                            <a th:if="${!#strings.isEmpty(instagramUrl)}" th:href="${instagramUrl}"
                               style="color:#94a3b8;text-decoration:none;margin-right:12px;">Instagram</a>
                            <a th:if="${!#strings.isEmpty(tiktokUrl)}" th:href="${tiktokUrl}"
                               style="color:#94a3b8;text-decoration:none;margin-right:12px;">TikTok</a>
                            <a th:if="${!#strings.isEmpty(youtubeUrl)}" th:href="${youtubeUrl}"
                               style="color:#94a3b8;text-decoration:none;margin-right:12px;">YouTube</a>
                            <a th:if="${!#strings.isEmpty(linkedinUrl)}" th:href="${linkedinUrl}"
                               style="color:#94a3b8;text-decoration:none;">LinkedIn</a>
                        </p>

                        <!-- Copyright -->
                        <p style="margin:0;font-size:12px;color:#cbd5e1;">
                            &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span>
                            <span th:text="${appName ?: ''}"></span>.
                            <a th:if="${!#strings.isEmpty(privacyUrl)}" th:href="${privacyUrl}"
                               style="color:#94a3b8;text-decoration:none;margin-left:8px;">Privacy Policy</a>
                        </p>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
