<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Configuration</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 32px 16px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: #f8fafc;
        }

        .subtitle {
            margin-top: 6px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #94a3b8;
        }

        .config-field {
            margin-bottom: 0;
        }

        .field-group {
            margin-top: 26px;
        }

        .field-group:first-child {
            margin-top: 0;
        }

        .field-group-title {
            margin: 0 0 14px;
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type=text],
        input[type=email],
        input[type=url],
        input[type=password],
        input[type=number],
        textarea,
        select {
            width: 100%;
            padding: 11px 12px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.15s ease;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #6366f1;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .btn:hover {
            background: #4338ca;
        }

        .btn:active {
            background: #3730a3;
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 12px;
            }

            .group-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Configuration</h1>
    <p class="subtitle">Manage your application settings</p>

    <form method="post">
        <div th:each="group : ${fieldGroups}" class="field-group">
            <h2 th:if="${group.title != null}" class="field-group-title" th:text="${group.title}"></h2>

            <div class="group-grid">
                <div th:each="field : ${group.fields}" class="config-field"
                     th:classappend="${field.inputType == 'textarea'} ? ' full-width' : ''">
                    <label th:for="${field.name}" th:text="${field.label}"></label>

                    <textarea th:if="${field.inputType == 'textarea'}"
                              th:id="${field.name}"
                              th:name="${field.name}"
                              th:text="${field.value}">
                        </textarea>

                    <select th:if="${field.inputType == 'select'}"
                            th:id="${field.name}"
                            th:name="${field.name}">
                        <option th:each="option : ${field.options}"
                                th:value="${option.value}"
                                th:text="${option.label}"
                                th:selected="${option.value == (field.value ?: '')}">
                        </option>
                    </select>

                    <input th:if="${field.inputType != 'textarea' and field.inputType != 'select'}"
                           th:id="${field.name}"
                           th:name="${field.name}"
                           th:type="${field.inputType}"
                           th:value="${field.value}">
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn" type="submit">Save</button>
        </div>
    </form>
</div>

</body>
</html>
